<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Supply</title>
    <link href="style.css" rel="stylesheet"/>
    <link href="supply.css" rel="stylesheet"/>
</head>
<body>
    <section class="side-panel">
        <nav>
        <h2>👩🏾‍🌾Agro Ledger</h2><hr>
        <a href="index.html">📊Dashboard</a>
        <a href="search.html">🔍Search</a> 
        <a href="crops.html">🌱Crops</a>
        <a href="supply.html" class="active">🛠️Supply</a>    
        <a href="#" class="disabled">🐄Livestock   (Coming Soon)</a>
        <a href="#" class="disabled">📈Statistics   (Coming Soon)</a>   
        </nav>
        <div class="user-details">
            <p> 👤User: <span id="welcomeName"></span><br>
                Farm Manager
            </p>
            <button onclick="logOut()" class="logout-btn" id="logoutBtn">← Log Out</button>
        </div>
    </section>
    <section class="supply">
        <header>
            <div><p>AGRO LEDGER</p>
        <h1>Supply</h1>
        <p class="supply-sub">Manage farm supply stock.</p>
        </div>
        </header>
        <details>
        <summary id="add-supply-btn">➕ Add Supply</summary>
        <div class="supplyForm">
            <form class="add-supply-Form" id="add-supply-Form">
                 <button class="cancel" id="top-cancel-btn" onclick="this.parentElement.style.display='none'">&times;</button>
                    <h2>Add Supply</h2>
                    <label>Supply Name</label><br>
                    <input type="text" id="itemName" class="supply-input" placeholder="e.g. NPK Fertilizer" required/><br><br>
                    <div class="add-supply-container">
                        <div>
                    <label>Category:</label><br>
                     <select id="supplyCategory" required>
                          <option value="Fertilizer">Fertilizer</option>
                          <option value="Pesticide">Pesticide</option>
                          <option value="Seed">Seed</option>
                          <option value="Irrigation">Irrigation</option>
                          <option value="Equipment">Equipment</option>
                          <option value="Other">Other</option>
                         
                    </select>
                    </div>
                    <div>
                        <label>Unit:</label><br>
                        <select id="unit"required>
                            <option value="Kg">Kg</option>
                            <option value="L">L</option>
                            <option value="bags">bags</option>
                            <option value="units">units</option>
                            <option value="tons">tons</option>

                        </select>
                    </div>
                    </div><br>
                    <div class="add-supply-container">
                        <div>
                        <label>Current Stock:</label><br>
                       <input type="number" id="stockValue" placeholder="500" required/>
                        </div>
                        <div>
                            <label>Minimum Level(Alert)</label><br>
                            <input type="number" placeholder="30" id="minLevel" required/>
                        </div>
                    </div><br><br>
                    <label>Notes</label><br>
                    <input class="supply-input" id="notes" type="text" placeholder="Additional notes..." required/><br><br>
                    <button class="cancel" id="close-form" onclick="this.parentElement.style.display='none'">Cancel</button>
                    <button id="saveSupply" type="submit">Save Supply</button>
            </form>
        </div>
        <section></section></details>
        <section class="supply-table">
                <table>
                    <thead>
                    <tr>
                        <th>Supply Name</th>
                        <th>Category</th>
                        <th>Stock</th>
                        <th>Unit</th>
                        <th>Min Level</th>
                        <th>Status</th>
                        <th>Notes</th>
                        <th>Actions</th>
                    </tr>
                    </thead>
                    <tbody id="supplyTableBody"></tbody>
                </table>
            </section>
    </section>
    <script src="supply.js"></script>
</body>
</html>
