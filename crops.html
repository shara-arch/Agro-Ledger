<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Crops</title>
    <link href="style.css" rel="stylesheet"/>
    <link rel="stylesheet" href="crops.css"/>
</head>
<body>
    <section class="side-panel">
        <nav>
        <h2>👩🏾‍🌾Agro Ledger</h2><hr>
        <a href="index.html">📊Dashboard</a>
        <a href="search.html">🔍Search</a> 
        <a href="crops.html" class="active">🌱Crops</a>
        <a href="supply.html">🛠️Supply</a>    
        <a href="#" class="disabled">📈Statistics(Coming Soon)</a>
        <a href="#" class="disabled">🐄Livestock(Coming Soon)</a>
        </nav>
        <div class="user-details">
            <p> 👤User: <span id="welcomeName"></span><br>
                Farm Manager
            </p>
            <button onclick="logOut()" class="logoout-btn" id="logoutBtn">← Log Out</button>
        </div>
    </section>
    <section class="crops">
        <header>
        
        <div><p>AGRO LEDGER</p>
        <h1>Crops</h1>
        <p class="crop-sub">Manage your crop inventory.</p>
        </div>

        </header>

        <details>
        <summary id="add-crop-btn">➕ Add Crop</summary>
        <div class="cropForm">
            <form class="add-crop-Form" id="add-crop-Form">
                 <button class="cancel" id="top-cancel-btn" onclick="this.parentElement.style.display='none'">&times;</button>
                    <h2>Add Crop</h2>
                    <label>Crop Name</label><br>
                    <input type="text" id="cropName" class="crop-input" placeholder="e.g. Maize" required/><br><br>
                    <div class="add-crop-container">
                        <div>
                    <label>Type:</label><br>
                     <select id="cropType" required>
                          <option value="Cereal">Cereal</option>
                          <option value="Grain">Grain</option>
                          <option value="Legume">Legume</option>
                          <option value="Fruit">Fruit</option>
                          <option value="Vegetable">Vegetable</option>
                         
                    </select>
                    </div>
                    <div>
                        <label>Quantity(kg)</label><br>
                        <input id="cropQuantity" type="number" placeholder="500" required/>
                    </div>
                    </div><br>
                    <div class="add-crop-container">
                        <div>
                        <label>Growth Stage</label><br>
                        <select id="growthStage" required>
                            <option value="Seedling">Seedling</option>
                            <option value="Vegetative">Vegetative</option>
                            <option value="Flowering">Flowering</option>
                            <option value="Fruiting">Fruiting</option>
                            <option value="Harvesting">Harvesting</option>
                        </select>
                        </div>
                        <div>
                            <label>Expected Harvest Date</label><br>
                            <input id="expectedHarvestDate" type="date" placeholder="mm/dd/yyyy" required/>
                        </div>
                    </div><br><br>
                    <label>Linked Supplies(optional)</label><br>
                    <input id="cropSupplies" class="crop-input" type="text" placeholder="e.g. NPK Fertilizer, Irrigation"/><br><br>
                    <button class="cancel" id="close-form" onclick="this.parentElement.style.display='none'">Cancel</button>
                    <button id="saveCrop"  type="submit">Save Crop</button>
            </form>
        </div>
        <section></section></details>
        <section class="crops-table">

                 <table>
                   <thead>
                        <tr>
                          <th>CROP NAME</th>
                          <th>TYPE</th>
                          <th>QTY (Kg)</th>
                          <th>STAGE</th>
                          <th>HARVEST DATE</th>
                          <th>ACTIONS</th>
                       </tr>
                    </thead>
    <tbody id="cropsTableBody"></tbody>
  </table>
        </section>
        </section>
    </section>
    <script src="crops.js" defer></script>
</body>
</html>
