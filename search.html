<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Search</title>
    <link href="style.css" rel="stylesheet"/>
</head>
<body>
    <section class="side-panel">
        <h2>Agro Ledger</h2>
        <a href="index.html">Dashboard</a>
        <a href="search.html">Search</a> 
        <a href="crops.html">Crops</a>
        <a href="supply.html">Supply</a>    
        <a href="statistics.html">Statistics</a>
        <div class="user-details">
            <p> User: <span id="welcomeName"></span><br>
                Farm Manager
            </p>
            <button onclick="logOut()" class="logoout-btn" id="logoutBtn">← Log Out</button>
        </div>
    </section>
    <section> 
        <h1> Search</h1>
         <div class="search-card">
          <div class="search-bar-wrap">
            <input type="text" id="search-input" class="search-input" placeholder="Search crops or supplies..." />
            <button class="search-btn" id="searchBtn" onclick="search">🔍 Searchh</button>
          </div>
          <div class="search-filters">
            <label><input type="checkbox" id="filter-crops" checked onchange="performSearch()"/> Crops</label>
            <label><input type="checkbox" id="filter-supplies" checked onchange="performSearch()"/> Supplies</label>
          </div>
        </div>
        <div id="search-results" class="search-results"></div>
    </section>
    <script src="index.js"></script>
</body>
</html>
