<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Search</title>
    <link href="style.css" rel="stylesheet"/>
    <link href="search.css" rel="stylesheet"/>
</head>
<body>
    <section class="side-panel">
        <nav>
        <h2>👩🏾‍🌾Agro Ledger</h2><hr>
        <a href="index.html">📊Dashboard</a>
        <a href="search.html"class="active">🔍Search</a> 
        <a href="crops.html">🌱Crops</a>
        <a href="supply.html">🛠️Supply</a>    
        <a href="#" class="disabled">🐄Livestock(Coming Soon)</a>
        <a href="#" class="disabled">📈Statistics(Coming Soon)</a>
    </nav>
        <div class="user-details">
            <p>👤User: <span id="welcomeName"></span><br>
                Farm Manager
            </p>
            <button onclick="logOut()" class="logoout-btn" id="logoutBtn">← Log Out</button>
        </div>
    </section>
    <section class="search"> 
        <header>
        <div><p>AGRO LEDGER</p>
        <h1> Search</h1>
        <p class="search-sub">Search crops and supplies</p>
        </div>
        
        </header>

         <div class="search-card">
          <div class="search-bar-wrap">
            <input type="text" id="search-input" class="search-input" placeholder="Search crops or supplies..." />
            <button class="search-btn" id="searchBtn" onclick="performSearch()">🔍</button>
          </div>
          <div class="search-filters">
            <label><input type="checkbox" id="filter-crops" checked onchange="performSearch()"/> Crops</label>
            <label><input type="checkbox" id="filter-supplies" checked onchange="performSearch()"/> Supplies</label>
          </div>
        </div>
        <div id="search-results" class="search-results"></div>
    </section>
    <script src="search.js"></script>
</body>
</html>
