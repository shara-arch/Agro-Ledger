<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="style.css"/>
    <title>Dashboard</title>
</head>
<body>
    <section class="side-panel">
        <h2>Agro Ledger</h2>
        <a href="index.html">Dashboard</a>
        <a href="search.html">Search</a> 
        <a href="crops.html">Crops</a>
        <a href="supply.html">Supply</a>    
        <a href="statistics.html">Statistics</a>
        <div class="user-details">
            <p> User: <span id="welcomeName"></span><br>
                Farm Manager
            </p>
            <button onclick="logOut()" class="logoout-btn" id="logoutBtn">← Log Out</button>
        </div>
    </section>
    <section class="dashboard">
        <header>
            <div>
            <h1>Dashboard</h1>
            <p class="welcome-sub" id="welcomeSub">Welcome back, <span id="welcomeName"></span></p>
            </div>
                <div id="notifBell" class="notif-bell"><button onclick="displayNotif()">
                    🔔<span id="notifCount">10</span></button>
                </div>
        </header>
        <div class="notif-panel" id="notifPanel">
            <h3>Low Stock Alerts</h3>
            <ul id="notifList"></ul>
        </div>
        <section class="overview">
            <p class="overview-sub">Overview of your farm</p>
            <div class="overview-container">
            <div class="overview-card" id="totalCrops">Total Crops<br><br>
                <span id="totalCropsValue">0</span>
            </div>
            <div class="overview-card" id="supplyItems">Supply Items<br><br>
                <span id="supplyItemsValue">0</span>
            </div>
            <div class="overview-card" id="lowStockAlerts">Low Stock Alerts<br><br>
                <span id="lowStockAlertsValue">0</span>
            </div>
            <div class="overview-card" id="upcomingHarvests">Upcoming Harvests<br><br>
                <span id="upcomingHarvestsValue">0</span>
                </div>
            </div>
        </section>
        <section > 
            <div class="summary">
                <h3>Recent Crops</h3>
                <ul id="summaryCropsList" class="item-list"></ul>
            </div>
            <div>
                <h3>Supply Status</h3>
                <ul id="summarySupplyList"></ul>
            </div>
        </section>
    </section>
    <script src="index.js"></script>
</body>
</html>
