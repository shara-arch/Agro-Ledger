<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login Page</title>
    <link rel="stylesheet" href="style.css"/>
</head>
<body>
    <div class="login-card">
        <header>
        <h1>Agro Ledger</h1>
        <p>Smart Inventory for Smart Farmers</p>
        </header>
        <form class="login-form">   
            <label for="username">Username</label>
            <input type="text" id="username" placeholder="farmer_loise" autocomplete="username"/>
            <label for="password">Password</label>
            <input  type="password" id="password" placeholder="Ahgra&9361" autocapitalize="password"/>
            <button class="login-btn" onclick="handleLogin">Sign In to Farm</button>
            <p class="login-hint">Username: shara Pass: 123456 </p>
        </form>

    </div>
    <script src="index.js"></script>
</body>
</html>
